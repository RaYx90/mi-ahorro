services:
  mi-ahorro:
    build: .
    container_name: mi-ahorro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "128M"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/miahorro"
      APP_PASSWORD: "${APP_PASSWORD}"
      SESSION_SECRET: "${SESSION_SECRET}"
      NODE_ENV: production
    networks:
      - postgres-net
      - caddy-net
    restart: unless-stopped

networks:
  postgres-net:
    external: true
  caddy-net:
    external: true
