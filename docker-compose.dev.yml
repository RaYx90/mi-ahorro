# Override para pruebas locales en Windows.
# Usa: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Diferencias con producción:
#   - NODE_ENV=development → cookie sin "secure", funciona sobre HTTP
#   - No expone puerto HTTPS (no se necesita en local)

services:
  mi-ahorro:
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
